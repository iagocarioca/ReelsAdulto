name: Deploy tikporn (FTP)

# Sobe o tema para wp-content/themes/tikporn/ no servidor via FTP a cada push na main.
# Configure em Settings → Secrets and variables → Actions:
#   Secrets:   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
#   Variables: FTP_SERVER_DIR (precisa terminar com /), FTP_PORT (opc.), FTP_PROTOCOL (ftp|ftps, opc.)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-tikporn-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    environment: ReelsAdulto
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verifica configuração de FTP
        shell: bash
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ] || [ -z "$FTP_SERVER_DIR" ]; then
            echo "::error::Faltam secrets/variáveis de FTP (FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR)."
            exit 1
          fi
          if [[ "$FTP_SERVER_DIR" != */ ]]; then
            echo "::error::FTP_SERVER_DIR precisa terminar com / (ex.: /public_html/wp-content/themes/tikporn/)"
            exit 1
          fi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ vars.FTP_SERVER_DIR }}

      - name: Upload do tema via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          local-dir: ./
          server-dir: ${{ vars.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md
            **/.DS_Store
